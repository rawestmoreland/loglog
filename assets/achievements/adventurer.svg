<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgG_adventurer" cx="36%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#F5B060"/>
      <stop offset="35%" stop-color="#D07828"/>
      <stop offset="70%" stop-color="#8F4210"/>
      <stop offset="100%" stop-color="#4A1A04"/>
    </radialGradient>
    <radialGradient id="sheenG_adventurer" cx="32%" cy="22%" r="62%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="goldG_adventurer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE87A"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A07808"/>
    </linearGradient>
    <filter id="shF_adventurer" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="innerGlow_adventurer">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="ccG_adventurer"><circle cx="200" cy="200" r="165"/></clipPath>
  </defs>

  <!-- Shadow -->
  <circle cx="200" cy="212" r="190" fill="#050200" filter="url(#shF_adventurer)"/>
  <!-- Outermost dark ring -->
  <circle cx="200" cy="200" r="196" fill="#0A0300"/>
  <circle cx="200" cy="200" r="190" fill="#140600"/>
  <!-- Gold outer ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="url(#goldG_adventurer)" stroke-width="5.5"/>
  <!-- Dots -->
  <circle cx="200.0" cy="20.0" r="4.5" fill="url(#goldGadventurer)"/><circle cx="246.6" cy="26.1" r="4.5" fill="url(#goldGadventurer)"/><circle cx="290.0" cy="44.1" r="4.5" fill="url(#goldGadventurer)"/><circle cx="327.3" cy="72.7" r="4.5" fill="url(#goldGadventurer)"/><circle cx="355.9" cy="110.0" r="4.5" fill="url(#goldGadventurer)"/><circle cx="373.9" cy="153.4" r="4.5" fill="url(#goldGadventurer)"/><circle cx="380.0" cy="200.0" r="4.5" fill="url(#goldGadventurer)"/><circle cx="373.9" cy="246.6" r="4.5" fill="url(#goldGadventurer)"/><circle cx="355.9" cy="290.0" r="4.5" fill="url(#goldGadventurer)"/><circle cx="327.3" cy="327.3" r="4.5" fill="url(#goldGadventurer)"/><circle cx="290.0" cy="355.9" r="4.5" fill="url(#goldGadventurer)"/><circle cx="246.6" cy="373.9" r="4.5" fill="url(#goldGadventurer)"/><circle cx="200.0" cy="380.0" r="4.5" fill="url(#goldGadventurer)"/><circle cx="153.4" cy="373.9" r="4.5" fill="url(#goldGadventurer)"/><circle cx="110.0" cy="355.9" r="4.5" fill="url(#goldGadventurer)"/><circle cx="72.7" cy="327.3" r="4.5" fill="url(#goldGadventurer)"/><circle cx="44.1" cy="290.0" r="4.5" fill="url(#goldGadventurer)"/><circle cx="26.1" cy="246.6" r="4.5" fill="url(#goldGadventurer)"/><circle cx="20.0" cy="200.0" r="4.5" fill="url(#goldGadventurer)"/><circle cx="26.1" cy="153.4" r="4.5" fill="url(#goldGadventurer)"/><circle cx="44.1" cy="110.0" r="4.5" fill="url(#goldGadventurer)"/><circle cx="72.7" cy="72.7" r="4.5" fill="url(#goldGadventurer)"/><circle cx="110.0" cy="44.1" r="4.5" fill="url(#goldGadventurer)"/><circle cx="153.4" cy="26.1" r="4.5" fill="url(#goldGadventurer)"/>
  <!-- Inner gold ring -->
  <circle cx="200" cy="200" r="169" fill="none" stroke="url(#goldG_adventurer)" stroke-width="2.5"/>
  <!-- Main badge fill -->
  <circle cx="200" cy="200" r="166" fill="url(#bgG_adventurer)"/>
  <!-- Sheen overlay -->
  <circle cx="200" cy="200" r="166" fill="url(#sheenG_adventurer)" clip-path="url(#ccG_adventurer)"/>

  <!-- ── ICON ── -->
  
  <g stroke-linecap="round" stroke-linejoin="round">
    <polygon points="128,285 170,195 212,285" fill="rgba(255,255,255,0.3)"/>
    <polygon points="188,285 234,182 280,285" fill="rgba(255,255,255,0.32)"/>
    <polygon points="148,285 200,140 252,285" fill="rgba(255,255,255,0.88)"/>
    <polygon points="200,140 183,176 217,176" fill="white"/>
    <path d="M 183 176 Q 192 162 200 140 Q 196 162 200 140" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <line x1="170" y1="195" x2="175" y2="202" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
    <line x1="234" y1="182" x2="240" y2="190" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>
    <line x1="126" y1="285" x2="274" y2="285" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- Banner -->
  <path d="M 65 306 A 164 164 0 0 0 335 306 L 341 352 A 172 172 0 0 1 59 352 Z" fill="#100400"/>
  <line x1="65" y1="306" x2="335" y2="306" stroke="url(#goldG_adventurer)" stroke-width="3.5"/>
  <path d="M 59 352 Q 200 366 341 352" fill="none" stroke="url(#goldG_adventurer)" stroke-width="3.5"/>
  <text x="200" y="334" text-anchor="middle" fill="url(#goldG_adventurer)"
        font-family="Arial Black,Impact,sans-serif"
        font-size="22" font-weight="900" letter-spacing="2">ADVENTURER</text>
</svg>