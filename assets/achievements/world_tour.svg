<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgG_world_tour" cx="36%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#F5B060"/>
      <stop offset="35%" stop-color="#D07828"/>
      <stop offset="70%" stop-color="#8F4210"/>
      <stop offset="100%" stop-color="#4A1A04"/>
    </radialGradient>
    <radialGradient id="sheenG_world_tour" cx="32%" cy="22%" r="62%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="goldG_world_tour" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE87A"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A07808"/>
    </linearGradient>
    <filter id="shF_world_tour" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="innerGlow_world_tour">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="ccG_world_tour"><circle cx="200" cy="200" r="165"/></clipPath>
  </defs>

  <!-- Shadow -->
  <circle cx="200" cy="212" r="190" fill="#050200" filter="url(#shF_world_tour)"/>
  <!-- Outermost dark ring -->
  <circle cx="200" cy="200" r="196" fill="#0A0300"/>
  <circle cx="200" cy="200" r="190" fill="#140600"/>
  <!-- Gold outer ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="url(#goldG_world_tour)" stroke-width="5.5"/>
  <!-- Dots -->
  <circle cx="200.0" cy="20.0" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="246.6" cy="26.1" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="290.0" cy="44.1" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="327.3" cy="72.7" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="355.9" cy="110.0" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="373.9" cy="153.4" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="380.0" cy="200.0" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="373.9" cy="246.6" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="355.9" cy="290.0" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="327.3" cy="327.3" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="290.0" cy="355.9" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="246.6" cy="373.9" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="200.0" cy="380.0" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="153.4" cy="373.9" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="110.0" cy="355.9" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="72.7" cy="327.3" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="44.1" cy="290.0" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="26.1" cy="246.6" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="20.0" cy="200.0" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="26.1" cy="153.4" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="44.1" cy="110.0" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="72.7" cy="72.7" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="110.0" cy="44.1" r="4.5" fill="url(#goldGworld_tour)"/><circle cx="153.4" cy="26.1" r="4.5" fill="url(#goldGworld_tour)"/>
  <!-- Inner gold ring -->
  <circle cx="200" cy="200" r="169" fill="none" stroke="url(#goldG_world_tour)" stroke-width="2.5"/>
  <!-- Main badge fill -->
  <circle cx="200" cy="200" r="166" fill="url(#bgG_world_tour)"/>
  <!-- Sheen overlay -->
  <circle cx="200" cy="200" r="166" fill="url(#sheenG_world_tour)" clip-path="url(#ccG_world_tour)"/>

  <!-- ── ICON ── -->
  
  <g stroke-linecap="round" stroke-linejoin="round">
    <circle cx="200" cy="188" r="54" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="3"/>
    <ellipse cx="200" cy="188" rx="54" ry="20" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2.5"/>
    <line x1="146" y1="188" x2="254" y2="188" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <ellipse cx="200" cy="188" rx="90" ry="34" fill="none" stroke="rgba(255,255,255,0.52)" stroke-width="4" stroke-dasharray="12,7"/>
    <g transform="rotate(-18,200,182)">
      <ellipse cx="200" cy="182" rx="62" ry="12" fill="rgba(255,255,255,0.9)"/>
      <ellipse cx="200" cy="182" rx="15" ry="52" fill="rgba(255,255,255,0.85)"/>
      <ellipse cx="150" cy="182" rx="6.5" ry="22" fill="rgba(255,255,255,0.8)"/>
      <ellipse cx="252" cy="178" rx="16" ry="10" fill="rgba(140,75,15,0.45)"/>
    </g>
  </g>

  <!-- Banner -->
  <path d="M 65 306 A 164 164 0 0 0 335 306 L 341 352 A 172 172 0 0 1 59 352 Z" fill="#100400"/>
  <line x1="65" y1="306" x2="335" y2="306" stroke="url(#goldG_world_tour)" stroke-width="3.5"/>
  <path d="M 59 352 Q 200 366 341 352" fill="none" stroke="url(#goldG_world_tour)" stroke-width="3.5"/>
  <text x="200" y="334" text-anchor="middle" fill="url(#goldG_world_tour)"
        font-family="Arial Black,Impact,sans-serif"
        font-size="22" font-weight="900" letter-spacing="2">WORLD TOUR</text>
</svg>