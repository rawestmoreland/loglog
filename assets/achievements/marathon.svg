<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgG_marathon" cx="36%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#F5B060"/>
      <stop offset="35%" stop-color="#D07828"/>
      <stop offset="70%" stop-color="#8F4210"/>
      <stop offset="100%" stop-color="#4A1A04"/>
    </radialGradient>
    <radialGradient id="sheenG_marathon" cx="32%" cy="22%" r="62%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="goldG_marathon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE87A"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A07808"/>
    </linearGradient>
    <filter id="shF_marathon" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="innerGlow_marathon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="ccG_marathon"><circle cx="200" cy="200" r="165"/></clipPath>
  </defs>

  <!-- Shadow -->
  <circle cx="200" cy="212" r="190" fill="#050200" filter="url(#shF_marathon)"/>
  <!-- Outermost dark ring -->
  <circle cx="200" cy="200" r="196" fill="#0A0300"/>
  <circle cx="200" cy="200" r="190" fill="#140600"/>
  <!-- Gold outer ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="url(#goldG_marathon)" stroke-width="5.5"/>
  <!-- Dots -->
  <circle cx="200.0" cy="20.0" r="4.5" fill="url(#goldGmarathon)"/><circle cx="246.6" cy="26.1" r="4.5" fill="url(#goldGmarathon)"/><circle cx="290.0" cy="44.1" r="4.5" fill="url(#goldGmarathon)"/><circle cx="327.3" cy="72.7" r="4.5" fill="url(#goldGmarathon)"/><circle cx="355.9" cy="110.0" r="4.5" fill="url(#goldGmarathon)"/><circle cx="373.9" cy="153.4" r="4.5" fill="url(#goldGmarathon)"/><circle cx="380.0" cy="200.0" r="4.5" fill="url(#goldGmarathon)"/><circle cx="373.9" cy="246.6" r="4.5" fill="url(#goldGmarathon)"/><circle cx="355.9" cy="290.0" r="4.5" fill="url(#goldGmarathon)"/><circle cx="327.3" cy="327.3" r="4.5" fill="url(#goldGmarathon)"/><circle cx="290.0" cy="355.9" r="4.5" fill="url(#goldGmarathon)"/><circle cx="246.6" cy="373.9" r="4.5" fill="url(#goldGmarathon)"/><circle cx="200.0" cy="380.0" r="4.5" fill="url(#goldGmarathon)"/><circle cx="153.4" cy="373.9" r="4.5" fill="url(#goldGmarathon)"/><circle cx="110.0" cy="355.9" r="4.5" fill="url(#goldGmarathon)"/><circle cx="72.7" cy="327.3" r="4.5" fill="url(#goldGmarathon)"/><circle cx="44.1" cy="290.0" r="4.5" fill="url(#goldGmarathon)"/><circle cx="26.1" cy="246.6" r="4.5" fill="url(#goldGmarathon)"/><circle cx="20.0" cy="200.0" r="4.5" fill="url(#goldGmarathon)"/><circle cx="26.1" cy="153.4" r="4.5" fill="url(#goldGmarathon)"/><circle cx="44.1" cy="110.0" r="4.5" fill="url(#goldGmarathon)"/><circle cx="72.7" cy="72.7" r="4.5" fill="url(#goldGmarathon)"/><circle cx="110.0" cy="44.1" r="4.5" fill="url(#goldGmarathon)"/><circle cx="153.4" cy="26.1" r="4.5" fill="url(#goldGmarathon)"/>
  <!-- Inner gold ring -->
  <circle cx="200" cy="200" r="169" fill="none" stroke="url(#goldG_marathon)" stroke-width="2.5"/>
  <!-- Main badge fill -->
  <circle cx="200" cy="200" r="166" fill="url(#bgG_marathon)"/>
  <!-- Sheen overlay -->
  <circle cx="200" cy="200" r="166" fill="url(#sheenG_marathon)" clip-path="url(#ccG_marathon)"/>

  <!-- ── ICON ── -->
  
  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M 151 136 L 249 136 L 216 194 L 249 252 L 151 252 L 184 194 Z"
          fill="rgba(255,255,255,0.13)" stroke="white" stroke-width="5.5" stroke-linejoin="round"/>
    <rect x="147" y="128" width="106" height="14" rx="5" fill="rgba(255,255,255,0.88)"/>
    <rect x="147" y="250" width="106" height="14" rx="5" fill="rgba(255,255,255,0.88)"/>
    <path d="M 157 142 L 243 142 L 214 192 Z" fill="rgba(255,255,255,0.75)"/>
    <line x1="160" y1="156" x2="240" y2="156" stroke="rgba(160,80,15,0.5)" stroke-width="3"/>
    <line x1="166" y1="170" x2="234" y2="170" stroke="rgba(160,80,15,0.4)" stroke-width="2.5"/>
    <path d="M 183 244 L 217 244 L 200 218 Z" fill="rgba(255,255,255,0.52)"/>
    <circle cx="200" cy="199" r="3" fill="rgba(255,255,255,0.88)"/>
    <circle cx="200" cy="206" r="2.5" fill="rgba(255,255,255,0.65)"/>
    <circle cx="200" cy="212" r="2" fill="rgba(255,255,255,0.42)"/>
  </g>

  <!-- Banner -->
  <path d="M 65 306 A 164 164 0 0 0 335 306 L 341 352 A 172 172 0 0 1 59 352 Z" fill="#100400"/>
  <line x1="65" y1="306" x2="335" y2="306" stroke="url(#goldG_marathon)" stroke-width="3.5"/>
  <path d="M 59 352 Q 200 366 341 352" fill="none" stroke="url(#goldG_marathon)" stroke-width="3.5"/>
  <text x="200" y="334" text-anchor="middle" fill="url(#goldG_marathon)"
        font-family="Arial Black,Impact,sans-serif"
        font-size="22" font-weight="900" letter-spacing="2">MARATHON</text>
</svg>