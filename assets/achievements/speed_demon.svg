  <!-- Sheen overlay -->
  <circle cx="200" cy="200" r="166" fill="url(#sheenG_speed_demon)" clip-path="url(#ccG_speed_demon)"/>

  <!-- ── ICON ── -->
  
  <g stroke-linecap="round" stroke-linejoin="round">
    <line x1="136" y1="174" x2="168" y2="174" stroke="rgba(255,255,255,0.48)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="128" y1="192" x2="162" y2="192" stroke="rgba(255,255,255,0.52)" stroke-width="5" stroke-linecap="round"/>
    <line x1="136" y1="210" x2="168" y2="210" stroke="rgba(255,255,255,0.48)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="144" y1="157" x2="170" y2="157" stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="144" y1="228" x2="170" y2="228" stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="226,128 190,198 216,198 178,264 236,190 206,190" fill="rgba(255,255,255,0.93)"/>
    <polygon points="220,145 200,194 212,194 194,240 228,198 212,198" fill="rgba(255,210,70,0.28)"/>
  </g>

  <!-- Banner -->
  <path d="M 65 306 A 164 164 0 0 0 335 306 L 341 352 A 172 172 0 0 1 59 352 Z" fill="#100400"/>
  <line x1="65" y1="306" x2="335" y2="306" stroke="url(#goldG_speed_demon)" stroke-width="3.5"/>
  <path d="M 59 352 Q 200 366 341 352" fill="none" stroke="url(#goldG_speed_demon)" stroke-width="3.5"/>
  <text x="200" y="334" text-anchor="middle" fill="url(#goldG_speed_demon)"
