  <circle cx="200" cy="200" r="190" fill="#140600"/>
  <!-- Gold outer ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="url(#goldG_speed_demon)" stroke-width="5.5"/>
  <!-- Dots -->
  <circle cx="200.0" cy="20.0" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="246.6" cy="26.1" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="290.0" cy="44.1" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="327.3" cy="72.7" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="355.9" cy="110.0" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="373.9" cy="153.4" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="380.0" cy="200.0" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="373.9" cy="246.6" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="355.9" cy="290.0" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="327.3" cy="327.3" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="290.0" cy="355.9" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="246.6" cy="373.9" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="200.0" cy="380.0" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="153.4" cy="373.9" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="110.0" cy="355.9" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="72.7" cy="327.3" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="44.1" cy="290.0" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="26.1" cy="246.6" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="20.0" cy="200.0" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="26.1" cy="153.4" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="44.1" cy="110.0" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="72.7" cy="72.7" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="110.0" cy="44.1" r="4.5" fill="url(#goldGspeed_demon)"/><circle cx="153.4" cy="26.1" r="4.5" fill="url(#goldGspeed_demon)"/>
  <!-- Inner gold ring -->
  <circle cx="200" cy="200" r="169" fill="none" stroke="url(#goldG_speed_demon)" stroke-width="2.5"/>
  <!-- Main badge fill -->
