<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgG_perfection" cx="36%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#F5B060"/>
      <stop offset="35%" stop-color="#D07828"/>
      <stop offset="70%" stop-color="#8F4210"/>
      <stop offset="100%" stop-color="#4A1A04"/>
    </radialGradient>
    <radialGradient id="sheenG_perfection" cx="32%" cy="22%" r="62%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="goldG_perfection" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE87A"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A07808"/>
    </linearGradient>
    <filter id="shF_perfection" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="innerGlow_perfection">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="ccG_perfection"><circle cx="200" cy="200" r="165"/></clipPath>
  </defs>

  <!-- Shadow -->
  <circle cx="200" cy="212" r="190" fill="#050200" filter="url(#shF_perfection)"/>
  <!-- Outermost dark ring -->
  <circle cx="200" cy="200" r="196" fill="#0A0300"/>
  <circle cx="200" cy="200" r="190" fill="#140600"/>
  <!-- Gold outer ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="url(#goldG_perfection)" stroke-width="5.5"/>
  <!-- Dots -->
  <circle cx="200.0" cy="20.0" r="4.5" fill="url(#goldGperfection)"/><circle cx="246.6" cy="26.1" r="4.5" fill="url(#goldGperfection)"/><circle cx="290.0" cy="44.1" r="4.5" fill="url(#goldGperfection)"/><circle cx="327.3" cy="72.7" r="4.5" fill="url(#goldGperfection)"/><circle cx="355.9" cy="110.0" r="4.5" fill="url(#goldGperfection)"/><circle cx="373.9" cy="153.4" r="4.5" fill="url(#goldGperfection)"/><circle cx="380.0" cy="200.0" r="4.5" fill="url(#goldGperfection)"/><circle cx="373.9" cy="246.6" r="4.5" fill="url(#goldGperfection)"/><circle cx="355.9" cy="290.0" r="4.5" fill="url(#goldGperfection)"/><circle cx="327.3" cy="327.3" r="4.5" fill="url(#goldGperfection)"/><circle cx="290.0" cy="355.9" r="4.5" fill="url(#goldGperfection)"/><circle cx="246.6" cy="373.9" r="4.5" fill="url(#goldGperfection)"/><circle cx="200.0" cy="380.0" r="4.5" fill="url(#goldGperfection)"/><circle cx="153.4" cy="373.9" r="4.5" fill="url(#goldGperfection)"/><circle cx="110.0" cy="355.9" r="4.5" fill="url(#goldGperfection)"/><circle cx="72.7" cy="327.3" r="4.5" fill="url(#goldGperfection)"/><circle cx="44.1" cy="290.0" r="4.5" fill="url(#goldGperfection)"/><circle cx="26.1" cy="246.6" r="4.5" fill="url(#goldGperfection)"/><circle cx="20.0" cy="200.0" r="4.5" fill="url(#goldGperfection)"/><circle cx="26.1" cy="153.4" r="4.5" fill="url(#goldGperfection)"/><circle cx="44.1" cy="110.0" r="4.5" fill="url(#goldGperfection)"/><circle cx="72.7" cy="72.7" r="4.5" fill="url(#goldGperfection)"/><circle cx="110.0" cy="44.1" r="4.5" fill="url(#goldGperfection)"/><circle cx="153.4" cy="26.1" r="4.5" fill="url(#goldGperfection)"/>
  <!-- Inner gold ring -->
  <circle cx="200" cy="200" r="169" fill="none" stroke="url(#goldG_perfection)" stroke-width="2.5"/>
  <!-- Main badge fill -->
  <circle cx="200" cy="200" r="166" fill="url(#bgG_perfection)"/>
  <!-- Sheen overlay -->
  <circle cx="200" cy="200" r="166" fill="url(#sheenG_perfection)" clip-path="url(#ccG_perfection)"/>

  <!-- ── ICON ── -->
  
  <g stroke-linecap="round" stroke-linejoin="round">
    <polygon points="200,136 209,165 240,165 216,183 225,212 200,195 175,212 184,183 160,165 191,165"
             fill="rgba(255,255,255,0.88)"/>
    <circle cx="200" cy="184" r="34" fill="rgba(100,45,8,0.72)"/>
    <circle cx="200" cy="184" r="34" fill="none" stroke="rgba(255,215,70,0.55)" stroke-width="3"/>
    <text x="200" y="195" text-anchor="middle" fill="white"
          font-family="Arial Black,Impact,sans-serif" font-size="40" font-weight="900"
          dominant-baseline="middle">4</text>
  </g>

  <!-- Banner -->
  <path d="M 65 306 A 164 164 0 0 0 335 306 L 341 352 A 172 172 0 0 1 59 352 Z" fill="#100400"/>
  <line x1="65" y1="306" x2="335" y2="306" stroke="url(#goldG_perfection)" stroke-width="3.5"/>
  <path d="M 59 352 Q 200 366 341 352" fill="none" stroke="url(#goldG_perfection)" stroke-width="3.5"/>
  <text x="200" y="334" text-anchor="middle" fill="url(#goldG_perfection)"
        font-family="Arial Black,Impact,sans-serif"
        font-size="22" font-weight="900" letter-spacing="2">PERFECTION</text>
</svg>