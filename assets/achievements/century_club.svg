<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgG_century_club" cx="36%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#F5B060"/>
      <stop offset="35%" stop-color="#D07828"/>
      <stop offset="70%" stop-color="#8F4210"/>
      <stop offset="100%" stop-color="#4A1A04"/>
    </radialGradient>
    <radialGradient id="sheenG_century_club" cx="32%" cy="22%" r="62%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="goldG_century_club" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE87A"/>
      <stop offset="45%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#A07808"/>
    </linearGradient>
    <filter id="shF_century_club" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="innerGlow_century_club">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="ccG_century_club"><circle cx="200" cy="200" r="165"/></clipPath>
  </defs>

  <!-- Shadow -->
  <circle cx="200" cy="212" r="190" fill="#050200" filter="url(#shF_century_club)"/>
  <!-- Outermost dark ring -->
  <circle cx="200" cy="200" r="196" fill="#0A0300"/>
  <circle cx="200" cy="200" r="190" fill="#140600"/>
  <!-- Gold outer ring -->
  <circle cx="200" cy="200" r="182" fill="none" stroke="url(#goldG_century_club)" stroke-width="5.5"/>
  <!-- Dots -->
  <circle cx="200.0" cy="20.0" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="246.6" cy="26.1" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="290.0" cy="44.1" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="327.3" cy="72.7" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="355.9" cy="110.0" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="373.9" cy="153.4" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="380.0" cy="200.0" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="373.9" cy="246.6" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="355.9" cy="290.0" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="327.3" cy="327.3" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="290.0" cy="355.9" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="246.6" cy="373.9" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="200.0" cy="380.0" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="153.4" cy="373.9" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="110.0" cy="355.9" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="72.7" cy="327.3" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="44.1" cy="290.0" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="26.1" cy="246.6" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="20.0" cy="200.0" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="26.1" cy="153.4" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="44.1" cy="110.0" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="72.7" cy="72.7" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="110.0" cy="44.1" r="4.5" fill="url(#goldGcentury_club)"/><circle cx="153.4" cy="26.1" r="4.5" fill="url(#goldGcentury_club)"/>
  <!-- Inner gold ring -->
  <circle cx="200" cy="200" r="169" fill="none" stroke="url(#goldG_century_club)" stroke-width="2.5"/>
  <!-- Main badge fill -->
  <circle cx="200" cy="200" r="166" fill="url(#bgG_century_club)"/>
  <!-- Sheen overlay -->
  <circle cx="200" cy="200" r="166" fill="url(#sheenG_century_club)" clip-path="url(#ccG_century_club)"/>

  <!-- ── ICON ── -->
  
  <g stroke-linecap="round" stroke-linejoin="round">
    <path d="M 148 208 Q 136 185 148 162 Q 160 178 154 208" fill="rgba(255,255,255,0.55)"/>
    <ellipse cx="143" cy="192" rx="10" ry="5" fill="rgba(255,255,255,0.5)" transform="rotate(-28,143,192)"/>
    <ellipse cx="147" cy="175" rx="10" ry="5" fill="rgba(255,255,255,0.5)" transform="rotate(-18,147,175)"/>
    <path d="M 252 208 Q 264 185 252 162 Q 240 178 246 208" fill="rgba(255,255,255,0.55)"/>
    <ellipse cx="257" cy="192" rx="10" ry="5" fill="rgba(255,255,255,0.5)" transform="rotate(28,257,192)"/>
    <ellipse cx="253" cy="175" rx="10" ry="5" fill="rgba(255,255,255,0.5)" transform="rotate(18,253,175)"/>
    <polygon points="200,138 207,160 230,160 212,173 219,195 200,183 181,195 188,173 170,160 193,160" fill="rgba(255,220,80,0.82)"/>
    <text x="200" y="232" text-anchor="middle" fill="white"
      font-family="Arial Black,Impact,sans-serif" font-size="72" font-weight="900" letter-spacing="-3">100</text>
  </g>

  <!-- Banner -->
  <path d="M 65 306 A 164 164 0 0 0 335 306 L 341 352 A 172 172 0 0 1 59 352 Z" fill="#100400"/>
  <line x1="65" y1="306" x2="335" y2="306" stroke="url(#goldG_century_club)" stroke-width="3.5"/>
  <path d="M 59 352 Q 200 366 341 352" fill="none" stroke="url(#goldG_century_club)" stroke-width="3.5"/>
  <text x="200" y="334" text-anchor="middle" fill="url(#goldG_century_club)"
        font-family="Arial Black,Impact,sans-serif"
        font-size="19" font-weight="900" letter-spacing="2">CENTURY CLUB</text>
</svg>